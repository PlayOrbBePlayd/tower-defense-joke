<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board — Game Show Roundup</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231746c9%22/%3E%3Ctext x=%2250%22 y=%2272%22 font-size=%2270%22 text-anchor=%22middle%22 fill=%22%23ffc21c%22 font-family=%22Arial%22 font-weight=%22bold%22%3EF%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/app.css?v=20260717b" />
  <link rel="stylesheet" href="css/board.css?v=20260717b" />
</head>
<body class="stage-lights">
  <div class="board-root" id="root">

    <!-- Header -->
    <div class="board-head">
      <div class="score-pod" id="pod0">
        <span class="team-name" id="t0name">TEAM 1</span>
        <span class="team-score" id="t0score">0</span>
      </div>
      <div class="board-brand">
        <div class="brand-logo" data-brand-logo></div>
        <div class="plate-title"></div>
      </div>
      <div class="score-pod right" id="pod1">
        <span class="team-score" id="t1score">0</span>
        <span class="team-name" id="t1name">TEAM 2</span>
      </div>
    </div>

    <!-- Stage swaps between logo / main / fast -->
    <div class="stage" id="stage"></div>
  </div>

  <div class="board-sync" id="boardSync"></div>

  <!-- Strikes overlay -->
  <div class="strikes-layer" id="strikesLayer"></div>
  <div id="flashHost"></div>
  <canvas id="fx" style="position:fixed;inset:0;pointer-events:none;z-index:59;"></canvas>
  <canvas id="confetti" style="position:fixed;inset:0;pointer-events:none;z-index:60;"></canvas>

  <script src="js/data.js?v=20260717b"></script>
  <script src="js/store.js?v=20260717b"></script>
  <script>window.FF_SYNC_ROLE = 'reader';</script>
  <script src="js/sync.js?v=20260717b"></script>
  <script src="js/audio.js?v=20260717b"></script>
  <script src="js/theme.js?v=20260717b"></script>
  <script src="js/confetti.js?v=20260717b"></script>
  <script src="js/fx.js?v=20260717b"></script>
  <script src="js/board.js?v=20260717b"></script>
</body>
</html>
