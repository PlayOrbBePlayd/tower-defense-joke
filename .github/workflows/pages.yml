name: Deploy to GitHub Pages

# Publishes the static app to GitHub Pages. This covers same-device use
# (Host Control + Board in separate windows on one machine) and serves as the
# frontend you can point at a WebSocket server for cross-device play.
#
# Note: GitHub Pages is static hosting only — it does NOT run the WebSocket
# server in server/. For cross-device sync, deploy that separately (see README:
# "Cross-device play"), e.g. the one-click Render deploy in render.yaml.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
