  /* self-hosted — no network dependency */

:root {
  --c-primary: #1746c9;
  --c-primary-lt: #4f7bff;
  --c-primary-dk: #0a2b8a;
  --c-accent: #ffc21c;
  --c-accent-dk: #b37c00;
  --c-deep: #050b2e;
  --c-deep-lt: #12205a;
  --c-text: #ffffff;
  --c-strike: #e23b3b;
  --c-primary-glow: rgba(255, 194, 28, 0.55);
  --c-primary-a30: rgba(23, 70, 201, 0.3);

  --font-display: 'Anton', 'Impact', 'Haettenschweiler', 'Arial Narrow', sans-serif;
  --font-cond: 'Barlow Condensed', 'Oswald', 'Arial Narrow', 'Impact', sans-serif;
  --font-ui: 'Rubik', system-ui, 'Segoe UI', Roboto, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; }

body {
  font-family: var(--font-ui);
  color: var(--c-text);
  background:
    radial-gradient(1200px 700px at 50% -10%, var(--c-deep-lt), transparent 60%),
    radial-gradient(900px 900px at 100% 100%, rgba(255,194,28,0.06), transparent 55%),
    linear-gradient(160deg, var(--c-deep), #01030f 90%);
  background-attachment: fixed;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* Stage-light sweep used on board + launcher */
.stage-lights::before {
  content: '';
  position: fixed; inset: -20% -20% auto -20%; height: 60vh; z-index: 0;
  background:
    conic-gradient(from 200deg at 20% 0, transparent 0 25%, rgba(255,194,28,.05) 30%, transparent 40%),
    conic-gradient(from 160deg at 80% 0, transparent 0 25%, rgba(79,123,255,.06) 30%, transparent 40%);
  pointer-events: none;
}

.hidden { display: none !important; }

/* ------- Buttons ---------------------------------------------------------- */
.btn {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: .3px;
  border: none;
  border-radius: 12px;
  padding: 12px 18px;
  cursor: pointer;
  color: #06122e;
  background: linear-gradient(180deg, #fff, #d8e0f5);
  box-shadow: 0 6px 0 rgba(0,0,0,.35), 0 10px 22px rgba(0,0,0,.35);
  transition: transform .07s ease, box-shadow .07s ease, filter .15s ease;
  user-select: none;
  display: inline-flex; align-items: center; gap: 8px; justify-content: center;
}
.btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,.35), 0 6px 14px rgba(0,0,0,.35); }
.btn:disabled { opacity: .4; cursor: not-allowed; filter: grayscale(.4); }
.btn.gold { background: linear-gradient(180deg, #ffe08a, var(--c-accent)); box-shadow: 0 6px 0 var(--c-accent-dk), 0 10px 22px rgba(0,0,0,.4); color:#3a2500; }
.btn.blue { background: linear-gradient(180deg, var(--c-primary-lt), var(--c-primary)); color:#fff; box-shadow: 0 6px 0 var(--c-primary-dk), 0 10px 22px rgba(0,0,0,.4); }
.btn.red  { background: linear-gradient(180deg, #ff7a7a, var(--c-strike)); color:#fff; box-shadow: 0 6px 0 #8f1f1f, 0 10px 22px rgba(0,0,0,.4); }
.btn.green{ background: linear-gradient(180deg, #7ee6a5, #17a34a); color:#062611; box-shadow: 0 6px 0 #0c6b2f, 0 10px 22px rgba(0,0,0,.4); }
.btn.ghost{ background: rgba(255,255,255,.06); color: #dfe6ff; box-shadow: inset 0 0 0 1px rgba(255,255,255,.18); }
.btn.ghost:active { transform: translateY(2px); }
.btn.sm { padding: 8px 12px; font-size: 13px; border-radius: 9px; }
.btn.lg { padding: 16px 26px; font-size: 18px; }
.btn.block { width: 100%; }

/* ------- Inputs ----------------------------------------------------------- */
input[type=text], input[type=number], textarea, select {
  font-family: var(--font-ui);
  font-size: 15px;
  color: #eaf0ff;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 10px;
  padding: 10px 12px;
  width: 100%;
  outline: none;
  transition: border-color .15s, background .15s;
}
input:focus, textarea:focus, select:focus { border-color: var(--c-accent); background: rgba(255,255,255,.09); }
label.fld { display:block; font-size:12px; text-transform:uppercase; letter-spacing:.12em; color:#9fb0e6; margin: 0 0 6px; font-weight:600; }
.field { margin-bottom: 14px; }

/* ------- Panels / cards --------------------------------------------------- */
.panel {
  background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 16px;
  padding: 18px;
  box-shadow: 0 20px 60px rgba(0,0,0,.35);
  position: relative;
}
.panel h2 { font-family: var(--font-cond); font-weight:700; letter-spacing:.04em; font-size: 20px; text-transform: uppercase; color: var(--c-accent); margin-bottom: 12px; }

/* ------- Brand lockup ----------------------------------------------------- */
.brand-logo {
  width: 64px; height: 64px; border-radius: 14px;
  background: rgba(255,255,255,.06) center/contain no-repeat;
  border: 1px solid rgba(255,255,255,.12);
  display: grid; place-items: center; flex: 0 0 auto;
}
.brand-logo.has-logo { background-color: rgba(255,255,255,.95); background-size: contain; padding: 4px; }
.brand-logo:not(.has-logo)::after { content:'★'; color: var(--c-accent); font-size: 30px; }

/* The oval FEUD-style title plate */
.title-plate {
  font-family: var(--font-display);
  letter-spacing: .02em;
  text-align: center;
  color: #fff;
  text-shadow: 0 3px 0 var(--c-primary-dk), 0 6px 18px rgba(0,0,0,.6);
  line-height: .92;
}

/* ------- Toast ------------------------------------------------------------ */
.toast {
  position: fixed; left:50%; bottom: 28px; transform: translateX(-50%) translateY(30px);
  background: linear-gradient(180deg, #ffe08a, var(--c-accent)); color:#3a2500;
  font-weight: 800; padding: 12px 22px; border-radius: 999px;
  box-shadow: 0 10px 30px rgba(0,0,0,.5); opacity: 0; pointer-events:none;

/* ==========================================================================
   board.css — the big audience display
   ========================================================================== */
.board-root {
  position: relative; z-index: 1;
  height: 100vh; width: 100vw; overflow: hidden;
  display: flex; flex-direction: column;
  padding: clamp(14px, 2.2vw, 40px);
}

/* ---- Header: logo + scores ---- */
.board-head {
  display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
  gap: 20px; margin-bottom: clamp(10px, 1.6vh, 24px);
}
.score-pod {
  display: flex; align-items: center; gap: 16px;
  background: linear-gradient(180deg, var(--c-primary), var(--c-primary-dk));
  border: 2px solid rgba(255,255,255,.25);
  border-radius: 18px; padding: 10px 22px;
  box-shadow: inset 0 2px 10px rgba(255,255,255,.25), 0 12px 30px rgba(0,0,0,.4);
}
.score-pod.right { justify-content: flex-end; }
.score-pod .team-name { font-family: var(--font-cond); font-weight: 700; text-transform: uppercase; font-size: clamp(16px, 2vw, 30px); letter-spacing: .03em; opacity: .95; }
.score-pod .team-score {
  font-family: var(--font-display); font-size: clamp(34px, 5vw, 74px); line-height: .8;
  color: var(--c-accent); text-shadow: 0 3px 0 var(--c-accent-dk), 0 6px 14px rgba(0,0,0,.5);
  min-width: 1.4em; text-align: center;
}
.score-pod.active { animation: podPulse 1s ease-in-out infinite; border-color: var(--c-accent); }
@keyframes podPulse { 0%,100%{ box-shadow: inset 0 2px 10px rgba(255,255,255,.25), 0 0 0 rgba(255,194,28,0);} 50%{ box-shadow: inset 0 2px 10px rgba(255,255,255,.25), 0 0 42px var(--c-primary-glow);} }

.board-brand { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.board-brand .brand-logo { width: clamp(48px, 6vh, 84px); height: clamp(48px, 6vh, 84px); }
.board-brand .plate-title { font-family: var(--font-display); font-size: clamp(20px, 2.6vw, 40px); letter-spacing:.03em; color: var(--c-accent); text-shadow: 0 2px 0 var(--c-accent-dk); }

/* ---- Central stage ---- */
.stage { flex: 1; display: flex; flex-direction: column; min-height: 0; }

/* Question banner */
.q-banner {
  background: linear-gradient(180deg, #fff, #e7ecff);
  color: #0a1638; border-radius: 999px;
  font-family: var(--font-cond); font-weight: 700;
  font-size: clamp(18px, 2.5vw, 36px); text-align: center;
  padding: clamp(8px, 1.4vh, 18px) clamp(20px, 4vw, 60px);
  margin: 0 auto clamp(12px, 2vh, 26px);
  max-width: 92%;
  box-shadow: 0 10px 30px rgba(0,0,0,.4), inset 0 -4px 0 rgba(0,0,0,.08);
  border: 3px solid var(--c-accent);
  line-height: 1.05;
  transition: opacity .3s, transform .3s;
}
.q-banner.dim { opacity: 0; transform: translateY(-10px); }

/* The board frame that holds the answer slats */
.board-frame {
  flex: 1; min-height: 0;
  background:
    linear-gradient(180deg, var(--c-primary-lt), var(--c-primary) 40%, var(--c-primary-dk));
  border-radius: 22px;
  padding: clamp(12px, 1.8vw, 26px);
  box-shadow: 0 26px 70px rgba(0,0,0,.55), inset 0 0 0 4px rgba(255,255,255,.12), inset 0 0 60px rgba(0,0,0,.35);
  border: 4px solid var(--c-accent);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
/* bank chip at top of board */
.bank-chip {
  position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(180deg, #ffe08a, var(--c-accent)); color:#3a2500;
  font-family: var(--font-display); font-size: clamp(20px, 2.4vw, 34px);
  padding: 6px 26px; border-radius: 999px; letter-spacing:.02em;
  box-shadow: 0 8px 22px rgba(0,0,0,.5), inset 0 2px 0 rgba(255,255,255,.6);
  border: 2px solid #fff; z-index: 3; white-space: nowrap;
}
.bank-chip small { font-family: var(--font-cond); font-weight:700; font-size:.5em; display:block; text-align:center; letter-spacing:.12em; opacity:.8; }

.slat-grid {
  width: 100%; height: 100%;
  display: grid; grid-auto-rows: 1fr;
  gap: clamp(6px, 1vh, 14px);
  align-content: stretch;
}
.slat-grid.two-col { grid-template-columns: 1fr 1fr; grid-auto-flow: column; }

/* ---- Answer slat with 3D flip ---- */
.slat { perspective: 1400px; min-height: 0; }
.slat-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform .55s cubic-bezier(.2,.8,.2,1);
  border-radius: 12px;
}
.slat.revealed .slat-inner { transform: rotateX(180deg); }
.slat-face {
  position: absolute; inset: 0; backface-visibility: hidden;
  border-radius: 12px; display: flex; align-items: center;
  box-shadow: inset 0 0 0 2px rgba(255,255,255,.18), 0 6px 16px rgba(0,0,0,.4);
  overflow: hidden;
}
/* Front = mystery number */
.slat-front {
  background: linear-gradient(180deg, #123a9e, #0a2470);
  justify-content: center;
}
.slat-front .num {
  font-family: var(--font-display);
  font-size: clamp(26px, 4.4vh, 60px);
  color: var(--c-accent);
  text-shadow: 0 3px 0 var(--c-accent-dk), 0 4px 16px rgba(0,0,0,.5);
  width: clamp(40px, 6vh, 72px); height: clamp(40px, 6vh, 72px);
  border-radius: 50%; display: grid; place-items: center;
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.2), transparent 60%), #0a2470;
  box-shadow: inset 0 0 0 3px var(--c-accent), 0 4px 12px rgba(0,0,0,.5);
}
/* Back = answer + points */
.slat-back {
  transform: rotateX(180deg);
  background: linear-gradient(180deg, #eef2ff, #cdd8ff);
  color: #0a1638; justify-content: space-between;
  padding: 0 clamp(10px, 1.4vw, 22px);
}
.slat-back .ans {
  font-family: var(--font-cond); font-weight: 700; text-transform: uppercase;
  font-size: clamp(16px, 3vh, 40px); letter-spacing: .01em; line-height: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.slat-back .rank {
  font-family: var(--font-display); font-size: clamp(14px, 2.4vh, 30px);
  color: var(--c-primary); margin-right: 12px; opacity:.5; flex: 0 0 auto;
}
.slat-back .pts {
  font-family: var(--font-display);
  background: linear-gradient(180deg, var(--c-primary-lt), var(--c-primary-dk));
  color: #fff; height: 100%; display: grid; place-items: center;
  padding: 0 clamp(12px, 1.4vw, 26px); font-size: clamp(20px, 3.4vh, 46px);
  box-shadow: inset 0 0 0 2px rgba(255,255,255,.25); flex: 0 0 auto;
  min-width: clamp(52px, 5vw, 92px);
}
.slat.pop .slat-inner { animation: slatPop .5s ease; }
@keyframes slatPop { 0%{transform:rotateX(180deg) scale(1);} 40%{transform:rotateX(180deg) scale(1.06);} 100%{transform:rotateX(180deg) scale(1);} }

/* Empty slots (unused answers this question) */
.slat.empty .slat-front { background: linear-gradient(180deg, #0c1c52, #081541); opacity:.5; }
.slat.empty .slat-front .num { visibility: hidden; }

/* ---- Strikes overlay ---- */
.strikes-layer {
  position: fixed; inset: 0; z-index: 40; display: none;
  align-items: center; justify-content: center; gap: clamp(20px, 5vw, 90px);
  background: rgba(2,6,24,.55); backdrop-filter: blur(2px);
}
.strikes-layer.show { display: flex; }
.strikes-layer .x {
  font-family: var(--font-display); color: var(--c-strike);
  font-size: clamp(120px, 26vh, 340px); line-height: 1;
  text-shadow: 0 0 40px rgba(226,59,59,.9), 0 8px 0 #6b1414;
  animation: xSlam .35s cubic-bezier(.2,1.4,.4,1) both;
}
.strikes-layer .x:nth-child(2){ animation-delay:.06s; }
.strikes-layer .x:nth-child(3){ animation-delay:.12s; }
@keyframes xSlam { 0%{ transform: scale(3) rotate(-18deg); opacity:0;} 60%{opacity:1;} 100%{ transform: scale(1) rotate(-8deg); opacity:1;} }

/* Single big X flash (per wrong answer) */
.strike-flash {
  position: fixed; inset:0; z-index: 45; display:grid; place-items:center; pointer-events:none;
}
.strike-flash .x {
  font-family: var(--font-display); color: var(--c-strike);
  font-size: clamp(160px, 40vh, 520px);
  text-shadow: 0 0 60px rgba(226,59,59,.9), 0 10px 0 #6b1414;
  animation: flashX .9s ease forwards;
}
@keyframes flashX { 0%{transform:scale(2.6) rotate(-16deg); opacity:0;} 20%{opacity:1;transform:scale(1) rotate(-8deg);} 75%{opacity:1;} 100%{opacity:0; transform:scale(1.05) rotate(-8deg);} }

/* ---- Logo / idle screen ---- */
.logo-screen {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 26px; text-align:center;
}
.logo-screen .brand-logo { width: clamp(120px, 20vh, 260px); height: clamp(120px, 20vh, 260px); border-radius: 28px; }
.logo-screen .big-title { font-family: var(--font-display); font-size: clamp(48px, 11vw, 170px); color:#fff;
  text-shadow: 0 5px 0 var(--c-primary-dk), 0 10px 30px rgba(0,0,0,.6); line-height:.9; }
.logo-screen .big-title .accent { color: var(--c-accent); text-shadow: 0 5px 0 var(--c-accent-dk); }
.logo-screen .sub { font-family: var(--font-cond); font-weight:700; letter-spacing:.4em; text-transform:uppercase;
  font-size: clamp(14px, 2vw, 30px); color: var(--c-accent); }
.logo-screen .marquee { display:flex; gap:14px; }
.logo-screen .bulb { width: 14px; height:14px; border-radius:50%; background: var(--c-accent); box-shadow: 0 0 14px var(--c-accent); animation: bulb 1.1s infinite; }
.logo-screen .bulb:nth-child(odd){ animation-delay:.55s; }
@keyframes bulb { 0%,100%{opacity:1;} 50%{opacity:.25;} }

/* ---- FAST MONEY board ---- */
.fast-root { flex:1; display:flex; flex-direction:column; min-height:0; position:relative; }
.fast-title { text-align:center; font-family: var(--font-display); font-size: clamp(26px, 4vw, 60px); color: var(--c-accent);
  text-shadow: 0 3px 0 var(--c-accent-dk); margin-bottom: 8px; letter-spacing:.03em; }
.fast-total {
  margin: 0 auto clamp(10px,1.6vh,20px); background: linear-gradient(180deg, var(--c-primary-lt), var(--c-primary-dk));
  border: 3px solid var(--c-accent); border-radius: 16px; padding: 6px 40px;
  font-family: var(--font-display); font-size: clamp(30px, 5vw, 72px); color:#fff;
  box-shadow: 0 12px 30px rgba(0,0,0,.5), inset 0 2px 10px rgba(255,255,255,.2);

.fast-total small { font-family: var(--font-cond); font-weight:700; font-size:.3em; letter-spacing:.2em; display:block; text-align:center; color: var(--c-accent); }

.fast-grid { flex:1; display:grid; grid-template-columns: 1fr; gap: clamp(6px, 1.2vh, 14px); min-height:0; }
.fast-row {
  display:grid; grid-template-columns: 1fr auto; align-items:center; gap: 14px;
  background: linear-gradient(180deg, #123a9e, #0a2470);
  border-radius: 12px; padding: 0 18px; overflow:hidden;
  box-shadow: inset 0 0 0 2px rgba(255,255,255,.15), 0 6px 14px rgba(0,0,0,.35);
  position: relative;
}
.fast-row .fa-ans {
  font-family: var(--font-cond); font-weight:700; text-transform:uppercase;
  font-size: clamp(18px, 3.4vh, 46px); color:#fff; letter-spacing:.01em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity: 0; transition: opacity .25s;
}
.fast-row.show .fa-ans { opacity: 1; }
.fast-row .fa-num { position:absolute; left:0; top:0; bottom:0; width:52px; display:grid; place-items:center;
  font-family: var(--font-display); font-size: clamp(16px,2.6vh,30px); color: var(--c-accent); opacity:.6; }
.fast-row .fa-ans { padding-left: 44px; }
.fast-row .fa-pts {
  font-family: var(--font-display); min-width: clamp(70px, 7vw, 120px); text-align:center;
  background: linear-gradient(180deg, var(--c-accent), var(--c-accent-dk)); color:#3a2500;
  border-radius: 10px; padding: 4px 14px; font-size: clamp(20px, 3.2vh, 44px);
  box-shadow: inset 0 2px 0 rgba(255,255,255,.5); transform: scale(0); transition: transform .3s cubic-bezier(.2,1.5,.4,1);
}
.fast-row.show-pts .fa-pts { transform: scale(1); }
.fast-row.dup { outline: 3px solid var(--c-strike); }
.fast-row.dup::after { content:'✕'; position:absolute; right: 130px; color: var(--c-strike); font-family: var(--font-display); font-size: clamp(24px,4vh,48px); }

/* Timer ring */
.fast-timer { position:absolute; top: 0; right: 0; z-index: 5;
  width: clamp(70px, 9vh, 130px); height: clamp(70px, 9vh, 130px); }
.fast-timer .t-num { position:absolute; inset:0; display:grid; place-items:center; font-family: var(--font-display);
  font-size: clamp(26px, 4vh, 54px); color:#fff; }
.fast-timer.warn .t-num { color: var(--c-strike); }

.board-sync { position: fixed; left: 14px; bottom: 12px; z-index: 50;

 * store.js — Single source of truth for the whole app.
 *
 * The Control dashboard, the Board display, the Editor and the Branding page
 * are separate windows/tabs. They share ONE state object that lives in
 * localStorage and is broadcast between windows in real time.
 *

 *   - localStorage        -> persistence + cross-window `storage` events

      bank: 0,                 // accumulated points this round

      awardTeam: null,         // team the bank was awarded to (for animation)

    fast: {

      p1: emptyFast(),
      p2: emptyFast(),
      timerSeconds: 20,
      timerRunning: false,
      timerLabel: '',
      showTotals: false,
      revealAll: false,
    },

    // ---- Which mode the BOARD is currently showing ----
    boardMode: 'logo',         // 'logo' | 'main' | 'fast'

    // ---- Content library ----
    questions: {
      main: [],                // {q, answers:[{text,points}]}
      fast: [],                // {q, answers:[{text,points}]}  (answers = ranked responses)

    // Register a sender that pushes state to the network on every change.

    // Apply state received from the network (does NOT re-broadcast → no loops).

      tone(659, 0, 0.5, 'sine', 0.24);

(function (global) {

  function renderFast(s) {
    const f = s.fast;
    const pl = f.playerView === 2 ? f.p2 : f.p1;
    const key = JSON.stringify(pl.map((x) => [x.answer, x.points, x.revealed]))
      + '|' + f.playerView + '|' + f.showTotals + '|' + fastTotal(s) + '|' + f.timerLabel;

    if (prev.boardMode !== 'fast' || prev.fastStruct !== f.playerView + '|' + f.timerLabel) {
      stage.innerHTML = fastHtml(s);
      prev.boardMode = 'fast';
      prev.fastStruct = f.playerView + '|' + f.timerLabel;
      prev.fastKey = '';
    }

    // total
    const totEl = stage.querySelector('.fast-total .amt');
    if (totEl) totEl.textContent = fastTotal(s);
    const totBox = stage.querySelector('.fast-total');
    if (totBox) totBox.classList.toggle('hidden', !f.showTotals);

    // rows
    const rows = stage.querySelectorAll('.fast-row');
    rows.forEach((row, i) => {
      const item = pl[i];
      const ansEl = row.querySelector('.fa-ans');
      const ptsEl = row.querySelector('.fa-pts');
      ansEl.textContent = item.answer || '';
      ptsEl.textContent = item.points || 0;
      const wasShown = row.classList.contains('show');
      const showText = item.revealed;
      const showPts = item.revealed;
      row.classList.toggle('show', showText);
      // reveal points slightly after text for the classic effect
      if (showPts && !row.classList.contains('show-pts')) {
        setTimeout(() => row.classList.add('show-pts'), 260);
      } else if (!showPts) {
        row.classList.remove('show-pts');
      }
      if (showText && !wasShown && prev.fastKey !== '') Sound.flip();
    });
    prev.fastKey = key;

    // timer ring
    updateTimerRing(s);
  }

  function fastTotal(s) {
    const a = s.fast.p1.reduce((t, x) => t + (x.revealed ? +x.points || 0 : 0), 0);
    const b = s.fast.p2.reduce((t, x) => t + (x.revealed ? +x.points || 0 : 0), 0);
    return a + b;
  }

  function fastHtml(s) {
    const f = s.fast;
    const rows = Array.from({ length: 5 }, (_, i) => `
      <div class="fast-row" data-i="${i}">
        <span class="fa-num">${i + 1}</span>
        <span class="fa-ans"></span>
        <span class="fa-pts">0</span>
      </div>`).join('');
    const label = f.timerLabel ? `<div class="fast-timer" id="ftimer"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="8"/><circle id="tRing" cx="50" cy="50" r="44" fill="none" stroke="var(--c-accent)" stroke-width="8" stroke-linecap="round" stroke-dasharray="276" stroke-dashoffset="0"/></svg><div class="t-num" id="tNum">${f.timerSeconds}</div></div>` : '';
    return `
      <div class="fast-root">
        ${label}
        <div class="fast-title">FAST MONEY — ${escapeHtml(f.timerLabel || 'FINAL ROUND')}</div>
        <div class="fast-total ${f.showTotals ? '' : 'hidden'}"><small>TOTAL</small><span class="amt">${fastTotal(s)}</span></div>
        <div class="fast-grid">${rows}</div>
      </div>`;
  }

  function updateTimerRing(s) {
    const ring = document.getElementById('tRing');
    const num = document.getElementById('tNum');
    const timer = document.getElementById('ftimer');
    if (!ring || !num) return;
    const total = s.fast.timerMax || s.fast.timerSeconds || 20;
    const cur = s.fast.timerSeconds;
    const frac = Math.max(0, Math.min(1, cur / total));
    ring.style.strokeDashoffset = (276 * (1 - frac)).toFixed(1);
    num.textContent = cur;
    if (timer) timer.classList.toggle('warn', cur <= 5);
  }

  /* ---------------- utils ---------------- */
  function escapeHtml(str) {
    return String(str == null ? '' : str).replace(/[&<>"']/g, (c) => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  // Cross-device sync indicator (only visible when a server connection is in play)
  if (window.Sync) {
    const chip = document.getElementById('boardSync');
    Sync.onStatus((status, st) => {
      if (status === 'off') { chip.classList.remove('show'); return; }
      chip.classList.add('show');
      const label = { connecting: 'Connecting…', live: 'Live · Room ' + (st ? st.room : ''), retry: 'Reconnecting…' }[status] || status;
      chip.innerHTML = `<span class="d ${status}"></span>${label}`;
    });
  }

  Store.subscribe(render);
  document.addEventListener('DOMContentLoaded', render);
  render();
})();
